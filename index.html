<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kassasystem – Butik-Sthlm</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', 'Segoe UI', sans-serif; font-size: 13px; background: #f0f0f0; }

    .root { display: flex; flex-direction: column; min-height: 100vh; position: relative; }
    .color-bar { display: flex; height: 4px; }
    .nav { background: #222; display: flex; align-items: stretch; justify-content: space-between; }
    .nav-tabs { display: flex; }
    .nav-tab { background: transparent; border: none; color: #aaa; padding: 0 14px; height: 46px; cursor: pointer; font-size: 12px; font-weight: 500; }
    .nav-tab.active { background: #fff; color: #222; font-weight: 700; }
    .nav-right { display: flex; align-items: center; gap: 10px; padding-right: 14px; }
    .store-name { display: block; color: #999; font-size: 10px; }
    .user-name { display: block; color: #fff; font-weight: 700; font-size: 13px; }
    .menu-btn { background: transparent; border: 1px solid #555; color: #fff; border-radius: 4px; padding: 5px 9px; cursor: pointer; }

    .main { display: flex; flex: 1; }
    .left { width: 400px; min-width: 280px; background: #fff; display: flex; flex-direction: column; border-right: 1px solid #e5e5e5; }

    .search-row { display: flex; gap: 6px; padding: 12px; border-bottom: 1px solid #eee; }
    .search-wrap { flex: 1; display: flex; align-items: center; border: 1px solid #ddd; border-radius: 4px; padding: 0 8px; }
    .search-wrap input { flex: 1; border: none; outline: none; font-size: 12px; padding: 7px 0; background: transparent; }
    .scan-btn { background: #555; border: none; border-radius: 4px; color: #fff; padding: 0 12px; cursor: pointer; font-size: 14px; }

    .cart-area { flex: 1; overflow-y: auto; padding: 8px 12px; min-height: 180px; }
    .empty-cart { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 50px 0; color: #bbb; font-size: 12px; gap: 8px; }
    .cart-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #f5f5f5; }
    .cart-info { flex: 1; }
    .cart-name { font-weight: 500; color: #222; font-size: 12px; }
    .cart-sku { color: #aaa; font-size: 10px; }
    .qty-ctrl { display: flex; align-items: center; gap: 4px; }
    .qty-btn { width: 22px; height: 22px; border-radius: 3px; border: 1px solid #ddd; background: #f5f5f5; cursor: pointer; font-size: 13px; font-weight: 700; color: #333; }
    .qty-num { width: 20px; text-align: center; font-weight: 500; font-size: 12px; }
    .cart-price { font-weight: 500; font-size: 12px; min-width: 75px; text-align: right; color: #222; }
    .rm-btn { background: transparent; border: none; color: #ccc; cursor: pointer; font-size: 11px; padding: 2px 4px; }

    .totals-bar { border-top: 1px solid #eee; padding: 10px 12px; background: #fafafa; display: flex; justify-content: space-between; align-items: flex-start; }
    .att-betala { font-weight: 600; font-size: 13px; color: #333; }
    .totals-right { text-align: right; }
    .total-row { display: flex; gap: 10px; align-items: baseline; justify-content: flex-end; }
    .total-label { color: #999; font-size: 11px; }
    .total-amt { font-size: 13px; color: #222; }
    .total-big { font-size: 20px; font-weight: 600; }
    .sub-row { display: flex; gap: 10px; justify-content: flex-end; color: #aaa; font-size: 11px; }

    .action-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: auto auto; border-top: 1px solid #ddd; }
    .act-btn { border: 1px solid #666; padding: 13px 6px; cursor: pointer; font-size: 11px; font-weight: 500; background: #4a4a4a; color: #fff; }
    .act-btn.light { background: #e5e5e5; color: #666; border-color: #ccc; }
    .act-btn.pay { grid-row: 1/3; grid-column: 3; background: #777; font-size: 13px; font-weight: 600; opacity: 0.45; cursor: default; }
    .act-btn.pay.enabled { opacity: 1; background: #444; cursor: pointer; }
    .act-btn.pay.enabled:hover { background: #222; }

    .right { flex: 1; padding: 12px; overflow-y: auto; background: #f0f0f0; }
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 10px; }
    .prod-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 6px; cursor: pointer; text-align: left; overflow: hidden; display: flex; flex-direction: column; transition: border-color 0.12s, box-shadow 0.12s; padding: 0; }
    .prod-card:hover { border-color: #bbb; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .prod-img-wrap { height: 115px; display: flex; align-items: center; justify-content: center; background: #fafafa; border-bottom: 1px solid #f0f0f0; font-size: 38px; }
    .prod-info { padding: 8px 10px; display: flex; flex-direction: column; gap: 2px; }
    .prod-name { font-weight: 500; font-size: 12px; color: #222; line-height: 1.3; }
    .prod-sku { font-size: 10px; color: #bbb; }
    .prod-price { font-weight: 600; font-size: 12px; color: #222; margin-top: 5px; }
    .badge { display: inline-block; background: #e8f0fe; color: #3a60c7; font-size: 9px; padding: 1px 5px; border-radius: 3px; margin-top: 3px; }

    /* Receipt overlay */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .receipt { background: #fff; border-radius: 8px; padding: 28px 32px; width: 300px; font-family: 'Courier New', monospace; box-shadow: 0 12px 40px rgba(0,0,0,0.25); }
    .receipt-header { display: flex; flex-direction: column; align-items: center; gap: 2px; margin-bottom: 12px; }
    .receipt-store { font-size: 17px; font-weight: 700; color: #111; letter-spacing: 1px; }
    .receipt-sublabel { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 2px; }
    .receipt-date { font-size: 10px; color: #ccc; margin-top: 3px; }
    .receipt-divider { border-top: 1px dashed #ddd; margin: 10px 0; }
    .receipt-row { display: flex; align-items: baseline; gap: 6px; margin-bottom: 5px; }
    .receipt-item-name { flex: 1; font-size: 11px; color: #333; }
    .receipt-item-qty { font-size: 10px; color: #aaa; min-width: 20px; text-align: right; }
    .receipt-item-price { font-size: 11px; font-weight: 600; color: #222; min-width: 78px; text-align: right; }
    .receipt-total-row { display: flex; justify-content: space-between; font-weight: 700; font-size: 14px; color: #111; margin-bottom: 3px; }
    .receipt-sub-row { display: flex; justify-content: space-between; font-size: 10px; color: #aaa; margin-bottom: 2px; }
    .receipt-thanks { text-align: center; font-size: 11px; color: #aaa; margin: 12px 0 14px; letter-spacing: 0.5px; }
    .receipt-close { width: 100%; background: #333; color: #fff; border: none; border-radius: 5px; padding: 11px 0; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; }
    .receipt-close:hover { background: #111; }
  </style>
</head>
<body>
  <div class="root" id="app">
    <div class="color-bar">
      <div style="flex:1;background:#7c5cbf"></div>
      <div style="flex:1;background:#e05c5c"></div>
      <div style="flex:1;background:#5c9ce0"></div>
      <div style="flex:1;background:#5cbc7c"></div>
      <div style="flex:1;background:#e0b45c"></div>
      <div style="flex:1;background:#bc7c5c"></div>
    </div>
    <nav class="nav">
      <div class="nav-tabs" id="navTabs"></div>
      <div class="nav-right">
        <div>
          <span class="store-name">Butik-Sthlm</span>
          <span class="user-name">Klas</span>
        </div>
        <button class="menu-btn">☰</button>
      </div>
    </nav>
    <div class="main">
      <div class="left">
        <div class="search-row">
          <div class="search-wrap">
            <input type="text" id="searchInput" placeholder="Streckkod, artikelnummer eller benämning" />
          </div>
          <button class="scan-btn">⊙</button>
        </div>
        <div class="cart-area" id="cartArea"></div>
        <div class="totals-bar">
          <span class="att-betala">Att betala</span>
          <div class="totals-right">
            <div class="total-row">
              <span class="total-label">Totalt</span>
              <span class="total-amt">SEK <span class="total-big" id="totalAmt">0,00</span></span>
            </div>
            <div class="sub-row"><span>Netto</span><span id="nettoAmt">0,00</span></div>
            <div class="sub-row"><span>Summa moms</span><span id="momsAmt">0,00</span></div>
          </div>
        </div>
        <div class="action-grid">
          <button class="act-btn">Välj kund</button>
          <button class="act-btn">Visa tb/tg</button>
          <button class="act-btn pay" id="payBtn" onclick="openReceipt()">Betalning</button>
          <button class="act-btn light">Kvittorabatt</button>
          <button class="act-btn light">Parkera köp</button>
        </div>
      </div>
      <div class="right">
        <div class="product-grid" id="productGrid"></div>
      </div>
    </div>
  </div>

  <script>
    const TABS = ["Nytt köp","Hämta parkerat","Nytt återköp","Kvitton","Uttag/insättningar","Hämta order"];
    const PRODUCTS = [
      {id:1, name:"Adidas sneaker - Gul", sku:"TershineRefinedRubberAndTrim", price:559.20},
      {id:2, name:"Peak hoodie - L - Blå", sku:"tsu1relbl", price:520.00},
      {id:3, name:"Adidas sneaker - Blå", sku:"tsu1bl", price:559.20},
      {id:4, name:"Pannkaka", sku:"pan1", price:89.29},
      {id:5, name:"Peak hoodie - L - Gul", sku:"tsu1relgl", price:520.00},
      {id:6, name:"Adidas sneaker - Röd", sku:"tsu1red", price:559.20},
    ];

    let cart = {}, activeTab = "Nytt köp", query = "";
    const fmt = n => n.toFixed(2).replace(".", ",");
    const now = () => new Date().toLocaleString("sv-SE");

    function renderNav() {
      document.getElementById("navTabs").innerHTML = TABS.map(t =>
        `<button class="nav-tab${t === activeTab ? " active" : ""}" onclick="setTab('${t}')">${t}</button>`
      ).join("");
    }
    function setTab(t) { activeTab = t; renderNav(); }

    function renderProducts() {
      const q = query.toLowerCase();
      const list = PRODUCTS.filter(p => p.name.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q));
      document.getElementById("productGrid").innerHTML = list.map(p => `
        <button class="prod-card" onclick="addToCart(${p.id})">
          <div class="prod-img-wrap">📦</div>
          <div class="prod-info">
            <span class="prod-name">${p.name}</span>
            <span class="prod-sku">${p.sku}</span>
            <span class="prod-price">SEK ${fmt(p.price)}</span>
            ${cart[p.id] ? `<span class="badge">${cart[p.id].qty} i korg</span>` : ""}
          </div>
        </button>`).join("");
    }

    function renderCart() {
      const items = Object.values(cart);
      document.getElementById("cartArea").innerHTML = items.length === 0
        ? `<div class="empty-cart"><span style="font-size:28px">🛒</span><span>Inga varor tillagda</span></div>`
        : items.map(i => `
          <div class="cart-row">
            <div class="cart-info">
              <div class="cart-name">${i.name}</div>
              <div class="cart-sku">${i.sku}</div>
            </div>
            <div class="qty-ctrl">
              <button class="qty-btn" onclick="changeQty(${i.id},-1)">−</button>
              <span class="qty-num">${i.qty}</span>
              <button class="qty-btn" onclick="changeQty(${i.id},1)">+</button>
            </div>
            <span class="cart-price">SEK ${fmt(i.price * i.qty)}</span>
            <button class="rm-btn" onclick="removeItem(${i.id})">✕</button>
          </div>`).join("");

      const total = items.reduce((s, i) => s + i.price * i.qty, 0);
      document.getElementById("totalAmt").textContent = fmt(total);
      document.getElementById("nettoAmt").textContent = fmt(total / 1.25);
      document.getElementById("momsAmt").textContent = fmt(total * 0.25 / 1.25);
      document.getElementById("payBtn").classList.toggle("enabled", total > 0);
    }

    function addToCart(id) {
      const p = PRODUCTS.find(x => x.id === id);
      cart[id] = cart[id] ? {...cart[id], qty: cart[id].qty + 1} : {...p, qty: 1};
      renderCart(); renderProducts();
    }
    function changeQty(id, delta) {
      if (!cart[id]) return;
      const q = cart[id].qty + delta;
      if (q < 1) delete cart[id]; else cart[id].qty = q;
      renderCart(); renderProducts();
    }
    function removeItem(id) { delete cart[id]; renderCart(); renderProducts(); }

    function openReceipt() {
      const items = Object.values(cart);
      if (!items.length) return;
      const total = items.reduce((s, i) => s + i.price * i.qty, 0);
      const overlay = document.createElement("div");
      overlay.className = "overlay";
      overlay.innerHTML = `
        <div class="receipt">
          <div class="receipt-header">
            <span class="receipt-store">Butik-Sthlm</span>
            <span class="receipt-sublabel">Kvitto</span>
            <span class="receipt-date">${now()}</span>
          </div>
          <div class="receipt-divider"></div>
          ${items.map(i => `
            <div class="receipt-row">
              <span class="receipt-item-name">${i.name}</span>
              <span class="receipt-item-qty">x${i.qty}</span>
              <span class="receipt-item-price">SEK ${fmt(i.price * i.qty)}</span>
            </div>`).join("")}
          <div class="receipt-divider"></div>
          <div class="receipt-total-row"><span>Totalt</span><span>SEK ${fmt(total)}</span></div>
          <div class="receipt-sub-row"><span>Netto</span><span>${fmt(total / 1.25)}</span></div>
          <div class="receipt-sub-row"><span>Moms 25%</span><span>${fmt(total * 0.25 / 1.25)}</span></div>
          <div class="receipt-divider"></div>
          <div class="receipt-thanks">Tack för ditt köp!</div>
          <button class="receipt-close" onclick="closeReceipt(this)">Stäng &amp; nytt köp</button>
        </div>`;
      document.body.appendChild(overlay);
    }

    function closeReceipt(btn) {
      btn.closest(".overlay").remove();
      cart = {};
      renderCart(); renderProducts();
    }

    document.getElementById("searchInput").addEventListener("input", e => {
      query = e.target.value;
      renderProducts();
    });

    renderNav(); renderProducts(); renderCart();
  </script>
</body>
</html>
